<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatBot</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <!-- 登录/注册视图 -->
  <div class="auth-view" id="authView">
    <div class="auth-card">
      <div class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <h1 class="auth-title">ChatBot</h1>
      <p class="auth-subtitle">智能对话系统</p>

      <!-- 登录表单 -->
      <form class="auth-form" id="loginForm">
        <div class="auth-field">
          <label for="loginEmail">邮箱</label>
          <input type="email" id="loginEmail" class="auth-input" placeholder="your@email.com" autocomplete="email" required>
        </div>
        <div class="auth-field">
          <label for="loginPassword">密码</label>
          <input type="password" id="loginPassword" class="auth-input" placeholder="输入密码" autocomplete="current-password" required>
        </div>
        <div class="auth-error" id="loginError"></div>
        <button type="submit" class="btn-primary auth-submit" id="loginSubmit">登录</button>
        <p class="auth-switch">还没有账号？<button type="button" class="auth-switch-btn" id="showRegister">注册</button></p>
      </form>

      <!-- 注册表单 -->
      <form class="auth-form" id="registerForm" style="display:none">
        <div class="auth-field">
          <label for="regEmail">邮箱</label>
          <input type="email" id="regEmail" class="auth-input" placeholder="your@email.com" autocomplete="email" required>
        </div>
        <div class="auth-field">
          <label for="regPassword">密码</label>
          <input type="password" id="regPassword" class="auth-input" placeholder="至少 6 位" autocomplete="new-password" required minlength="6">
        </div>
        <div class="auth-field">
          <label for="regConfirm">确认密码</label>
          <input type="password" id="regConfirm" class="auth-input" placeholder="再次输入密码" autocomplete="new-password" required>
        </div>
        <div class="auth-error" id="registerError"></div>
        <button type="submit" class="btn-primary auth-submit" id="registerSubmit">注册</button>
        <p class="auth-switch">已有账号？<button type="button" class="auth-switch-btn" id="showLogin">登录</button></p>
      </form>
    </div>
  </div>

  <!-- 聊天主视图 -->
  <div class="app" id="chatView" style="display:none">
    <!-- 移动端遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>会话</h2>
        <button class="btn-icon" id="newChatBtn" title="新建会话">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
      <div class="session-list" id="sessionList"></div>
    </aside>

    <!-- 主聊天区 -->
    <main class="chat-main">
      <header class="chat-header">
        <button class="btn-icon" id="toggleSidebar" title="切换侧边栏">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <h1 class="chat-title" id="chatTitle">新对话</h1>
        <!-- API Key 状态指示器 -->
        <div class="api-status" id="apiStatus" title="API Key 未配置">
          <span class="api-status-dot"></span>
        </div>
        <button class="btn-icon" id="toggleSettings" title="设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"></path>
          </svg>
        </button>
        <!-- 用户菜单 -->
        <div class="user-menu" id="userMenu">
          <button class="user-avatar" id="userAvatar" title="用户菜单">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </button>
          <div class="user-dropdown" id="userDropdown">
            <div class="user-dropdown-header">
              <span class="user-dropdown-email" id="userDropdownEmail">user@email.com</span>
            </div>
            <div class="user-dropdown-divider"></div>
            <button class="user-dropdown-item" id="logoutBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
              退出登录
            </button>
          </div>
        </div>
      </header>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-container">
        <textarea
          class="chat-input"
          id="chatInput"
          placeholder="输入消息，Ctrl+Enter 发送"
          rows="1"
        ></textarea>
        <!-- 停止生成按钮（流式响应中显示） -->
        <button class="btn-stop" id="stopBtn" style="display:none" title="停止生成">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2"></rect>
          </svg>
        </button>
        <button class="btn-send" id="sendBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </main>

    <!-- 设置面板 -->
    <aside class="settings-panel" id="settingsPanel">
      <div class="settings-header">
        <h2>设置</h2>
        <button class="btn-icon" id="closeSettings" title="关闭">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="settings-content">
        <div class="setting-group">
          <label for="apiKey">API Key</label>
          <div class="input-with-action">
            <input type="password" id="apiKey" class="setting-input" placeholder="sk-...">
            <button class="btn-toggle-visibility" id="toggleApiKeyVisibility" title="显示/隐藏">
              <svg class="icon-eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="icon-eye-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>
        <div class="setting-group">
          <label for="model">模型</label>
          <select id="model" class="setting-select">
            <option value="gpt-4o">GPT-4o</option>
            <option value="gpt-4-turbo">GPT-4 Turbo</option>
            <option value="gpt-4">GPT-4</option>
            <option value="gpt-3.5-turbo" selected>GPT-3.5 Turbo</option>
          </select>
        </div>
        <div class="setting-group">
          <div class="setting-label-row">
            <label for="temperature">Temperature</label>
            <span class="setting-value" id="tempValue">0.7</span>
          </div>
          <input type="range" id="temperature" class="setting-range" min="0" max="2" step="0.1" value="0.7">
        </div>
        <div class="setting-group">
          <div class="setting-label-row">
            <label for="maxTokens">Max Tokens</label>
            <span class="setting-value" id="tokensValue">2000</span>
          </div>
          <input type="range" id="maxTokens" class="setting-range" min="100" max="4000" step="100" value="2000">
        </div>
        <div class="setting-actions">
          <button class="btn-primary" id="saveSettings">保存设置</button>
        </div>
      </div>
    </aside>
  </div>

  <!-- 确认弹框 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="confirmModal">
      <div class="modal-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <h3 class="modal-title" id="modalTitle">确认删除</h3>
      <p class="modal-message" id="modalMessage">删除后无法恢复，确定要删除这个会话吗？</p>
      <div class="modal-actions">
        <button class="btn-secondary" id="modalCancel">取消</button>
        <button class="btn-danger" id="modalConfirm">删除</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
